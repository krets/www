name: Syntax and Lint Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  php-syntax:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Update to match your environment

      - name: Run PHP Lint
        run: find . -name "*.php" -print0 | xargs -0 -n1 php -l

  js-css-lint:
    name: JS & CSS Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Prettier (Syntax & Formatting)
        # Uses Prettier to check JS and CSS files without requiring a package.json
        run: npx prettier@3 --check "**/*.{js,css}"
