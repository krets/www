<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALPR - Robust Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: #121212; color: #fff; }
        .container { display: flex; flex-direction: column; gap: 15px; }
        .video-wrapper { position: relative; width: 100%; border-radius: 8px; overflow: hidden; background: #000; line-height: 0; display: none; }
        video { width: 100%; display: block; }
        #overlayCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        canvas.hidden { display: none; }
        
        .controls { display: flex; flex-direction: column; gap: 10px; background: #1e1e1e; padding: 15px; border-radius: 8px; }
        .btn-group { display: flex; gap: 10px; }
        button { background: #333; color: #888; border: none; padding: 15px; border-radius: 8px; font-size: 14px; font-weight: bold; width: 100%; cursor: not-allowed; transition: background 0.3s; }
        button.ready { background: #0a84ff; color: white; cursor: pointer; }
        button.ready:active { background: #006ee6; }
        button.scanning { background: #ff3b30; color: white; cursor: pointer; animation: pulse 1.5s infinite; }
        button.aiming { background: #ff9900; color: white; cursor: pointer; }
        
        .sys-status { font-size: 12px; color: #aaa; display: flex; justify-content: space-between; padding: 0 5px; }
        .sys-status span.ready { color: #32d74b; }
        
        .output { background: #1e1e1e; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.5; }
        .hidden { display: none; }
        #warpedCanvas { width: 100%; margin-top: 10px; border: 1px solid #333; background: #000; }

        .history-container { margin-top: 20px; background: #1e1e1e; border-radius: 8px; overflow: hidden; }
        .history-header { padding: 10px 15px; background: #333; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .history-list { max-height: 300px; overflow-y: auto; padding: 0; margin: 0; list-style: none; }
        .history-item { padding: 12px 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .history-item:last-child { border-bottom: none; }
        .history-item .plate-info { display: flex; flex-direction: column; gap: 2px; }
        .history-item .plate-number { font-weight: bold; color: #0a84ff; font-family: monospace; font-size: 16px; }
        .history-item .plate-meta { font-size: 11px; color: #888; }
        .history-item .plate-region { font-size: 12px; color: #eee; }

        .action-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-approve { background: #32d74b; color: white; }
        .btn-retry { background: #ff3b30; color: white; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="video-wrapper" id="videoWrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="overlayCanvas"></canvas>
            <canvas id="processCanvas" class="hidden"></canvas>
        </div>

        <div class="controls">
            <div class="sys-status">
                <span id="camStatus">Cam: Waiting</span>
                <span id="cvStatus">OpenCV: Loading</span>
                <span id="ocrStatus">OCR: Loading</span>
            </div>
            <div class="btn-group">
                <button id="captureBtn" disabled>Dynamic Scan</button>
                <button id="manualBtn" disabled>Manual Scan</button>
            </div>
            <div id="status" style="text-align: center; font-size: 14px;">System initializing...</div>
        </div>

        <div class="output hidden" id="resultDiv">
            <div id="textResult"></div>
            <strong>OCR Input (Preview):</strong><br>
            <canvas id="warpedCanvas"></canvas>
            
            <div class="action-group" id="ocrActions">
                <button id="retryBtn" class="ready btn-retry">Retry</button>
                <button id="approveBtn" class="ready btn-approve">Run OCR</button>
            </div>
        </div>

        <div class="history-container">
            <div class="history-header">
                <span>Recent History</span>
                <button id="clearHistory" style="width: auto; padding: 4px 8px; font-size: 10px; background: #444;">Clear</button>
            </div>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <script>
        function getUKRegionData(tag) {
            const letter1 = tag.charAt(0);
            const letter2 = tag.charAt(1);
            const regions = {
                'A': { name: 'Anglia', offices: { 'A-N': 'Peterborough', 'O-U': 'Norwich', 'V-Y': 'Ipswich' } },
                'B': { name: 'Birmingham', offices: { 'A-Y': 'Birmingham' } },
                'C': { name: 'Cymru (Wales)', offices: { 'A-O': 'Cardiff', 'P-V': 'Swansea', 'W-Y': 'Bangor' } },
                'D': { name: 'Deeside', offices: { 'A-K': 'Chester', 'L-Y': 'Shrewsbury' } },
                'E': { name: 'Essex', offices: { 'A-Y': 'Chelmsford' } },
                'F': { name: 'Forest and Fens', offices: { 'A-P': 'Nottingham', 'R-Y': 'Lincoln' } },
                'G': { name: 'Garden of England', offices: { 'A-O': 'Maidstone', 'P-Y': 'Brighton' } },
                'H': { name: 'Hampshire & Dorset', offices: { 'A-J': 'Bournemouth', 'K-Y': 'Portsmouth' } },
                'K': { name: 'Milton Keynes', offices: { 'A-L': 'Borehamwood', 'M-Y': 'Northampton' } },
                'L': { name: 'London', offices: { 'A-J': 'Wimbledon', 'K-T': 'Stanmore', 'U-Y': 'Sidcup' } },
                'M': { name: 'Manchester & Merseyside', offices: { 'A-L': 'Manchester', 'M-Y': 'Isle of Man / Liverpool' } },
                'N': { name: 'North', offices: { 'A-O': 'Newcastle', 'P-Y': 'Stockton' } },
                'O': { name: 'Oxford', offices: { 'A-Y': 'Oxford' } },
                'P': { name: 'Preston', offices: { 'A-T': 'Preston', 'U-Y': 'Carlisle' } },
                'R': { name: 'Reading', offices: { 'A-Y': 'Reading' } },
                'S': { name: 'Scotland', offices: { 'A-J': 'Glasgow', 'K-O': 'Edinburgh', 'P-T': 'Dundee', 'U-W': 'Aberdeen', 'X-Y': 'Inverness' } },
                'V': { name: 'Severn Valley', offices: { 'A-Y': 'Worcester' } },
                'W': { name: 'West of England', offices: { 'A-J': 'Exeter', 'K-L': 'Truro', 'M-Y': 'Bristol' } },
                'Y': { name: 'Yorkshire', offices: { 'A-K': 'Leeds', 'L-U': 'Sheffield', 'V-Y': 'Beverley' } }
            };
            const region = regions[letter1];
            if (!region) return { region: "Unknown", office: "Unknown" };
            let office = "Unknown";
            for (const [range, name] of Object.entries(region.offices)) {
                const [start, end] = range.split('-');
                if (letter2 >= start && letter2 <= end) {
                    office = name; break;
                }
            }
            return { region: region.name, office: office };
        }

        const video = document.getElementById('video');
        const videoWrapper = document.getElementById('videoWrapper');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const overlayCtx = overlayCanvas.getContext('2d');
        const processCanvas = document.getElementById('processCanvas');
        const warpedCanvas = document.getElementById('warpedCanvas');
        const statusEl = document.getElementById('status');
        const captureBtn = document.getElementById('captureBtn');
        const manualBtn = document.getElementById('manualBtn');
        const retryBtn = document.getElementById('retryBtn');
        const approveBtn = document.getElementById('approveBtn');
        const resultDiv = document.getElementById('resultDiv');
        const textResult = document.getElementById('textResult');
        const historyList = document.getElementById('historyList');
        const clearHistoryBtn = document.getElementById('clearHistory');

        let isDetecting = false, isAiming = false, isReviewing = false, openCvReady = false, camReady = false;
        let videoTrack = null, tesseractWorker = null;
        let srcMat, grayMat, blurMat, edgesMat;
        let lastDetectedPoints = null;

        async function initTesseract() {
            tesseractWorker = await Tesseract.createWorker('eng');
            await tesseractWorker.setParameters({
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789 ',
                tessedit_pageseg_mode: '7',
            });
            document.getElementById('ocrStatus').innerText = "OCR: Ready";
            document.getElementById('ocrStatus').classList.add('ready');
            checkReadyState();
        }
        initTesseract();

        function onOpenCvReady() {
            openCvReady = true;
            document.getElementById('cvStatus').innerText = "OpenCV: Ready";
            document.getElementById('cvStatus').classList.add('ready');
            checkReadyState();
        }

        navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" }, width: { ideal: 1920 }, height: { ideal: 1080 } } })
            .then(setupVideo).catch(err => {
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(setupVideo).catch(e => statusEl.innerText = "Camera error: " + e);
            });

        function setupVideo(stream) {
            video.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];
            videoTrack.enabled = false; 
            
            video.addEventListener('loadedmetadata', () => {
                overlayCanvas.width = video.videoWidth;
                overlayCanvas.height = video.videoHeight;
                processCanvas.width = video.videoWidth;
                processCanvas.height = video.videoHeight;
                camReady = true;
                document.getElementById('camStatus').innerText = "Cam: Ready";
                document.getElementById('camStatus').classList.add('ready');
                checkReadyState();
                loadHistory();
            });
        }

        function checkReadyState() {
            if (openCvReady && camReady && tesseractWorker) {
                statusEl.innerText = "System Ready. Camera offline.";
                captureBtn.disabled = false; captureBtn.className = 'ready';
                manualBtn.disabled = false; manualBtn.className = 'ready';
                grayMat = new cv.Mat(); blurMat = new cv.Mat(); edgesMat = new cv.Mat();
            }
        }

        function toggleCamera(state) {
            videoTrack.enabled = state;
            videoWrapper.style.display = state ? 'block' : 'none';
            if (!state) overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        }

        captureBtn.addEventListener('click', () => {
            if (isAiming) cancelManual();
            if (isReviewing) return; // Prevent clicking while reviewing
            
            if (isDetecting) {
                if (lastDetectedPoints) {
                    isDetecting = false;
                    isReviewing = true;
                    captureBtn.className = 'ready'; captureBtn.innerText = "Dynamic Scan";
                    statusEl.innerText = "Reviewing captured plate frame...";
                    drawOverlay(lastDetectedPoints, "#00ff00");
                    warpPlate(lastDetectedPoints);
                } else {
                    isDetecting = false;
                    captureBtn.className = 'ready'; captureBtn.innerText = "Dynamic Scan";
                    statusEl.innerText = "Camera offline.";
                    toggleCamera(false);
                }
            } else {
                isDetecting = true;
                lastDetectedPoints = null;
                toggleCamera(true);
                captureBtn.className = 'scanning'; captureBtn.innerText = "Searching...";
                statusEl.innerText = "Align plate. Tap button to capture when green box appears.";
                resultDiv.classList.add('hidden');
                requestAnimationFrame(processVideo);
            }
        });

        retryBtn.addEventListener('click', () => {
            isReviewing = false;
            resultDiv.classList.add('hidden');
            // Restart detection
            isDetecting = true;
            captureBtn.className = 'scanning'; captureBtn.innerText = "Searching...";
            statusEl.innerText = "Resumed scanning...";
            requestAnimationFrame(processVideo);
        });

        approveBtn.addEventListener('click', () => {
            document.getElementById('ocrActions').classList.add('hidden');
            statusEl.innerText = "Running Tesseract Engine...";
            runOCR();
        });

        function processVideo() {
            if (!isDetecting || isReviewing) return;
            const points = extractPlateEdges(overlayCtx); 
            if (points) {
                lastDetectedPoints = points;
                captureBtn.className = 'scanning aiming'; 
                captureBtn.innerText = "TAP TO FREEZE";
                drawOverlay(points, "#32d74b");
            } else {
                if (lastDetectedPoints) drawOverlay(lastDetectedPoints, "rgba(50, 215, 75, 0.3)");
            }
            requestAnimationFrame(processVideo);
        }

        function cancelManual() {
            isAiming = false;
            manualBtn.className = 'ready'; manualBtn.innerText = "Manual Scan";
            toggleCamera(false);
        }

        manualBtn.addEventListener('click', () => {
            if (isDetecting) { isDetecting = false; captureBtn.className = 'ready'; captureBtn.innerText = "Dynamic Scan"; }
            if (isReviewing) { isReviewing = false; resultDiv.classList.add('hidden'); }
            
            if (!isAiming) {
                isAiming = true; toggleCamera(true);
                manualBtn.className = 'aiming'; manualBtn.innerText = "Freeze Frame";
                statusEl.innerText = "Align plate inside the orange box.";
                resultDiv.classList.add('hidden');
                requestAnimationFrame(drawTargetBox);
            } else {
                isAiming = false;
                isReviewing = true;
                manualBtn.className = 'ready'; manualBtn.innerText = "Manual Scan";
                statusEl.innerText = "Reviewing captured manual frame...";
                const points = extractPlateEdges();
                if (points) {
                    warpPlate(points);
                } else {
                    fallbackPureCanvasCrop();
                }
            }
        });

function warpPlate(points) {
    const width = 600; const height = 150; 
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    processCanvas.width = vw;
    processCanvas.height = vh;
    const processCtx = processCanvas.getContext('2d');
    processCtx.drawImage(video, 0, 0, vw, vh);
    
    let fullSrc = cv.imread(processCanvas);

    const center = points.reduce((acc, p) => ({x: acc.x + p.x/4, y: acc.y + p.y/4}), {x:0, y:0});
    const expandedPoints = points.map(p => ({
        x: Math.max(0, Math.min(vw, center.x + (p.x - center.x) * 1.15)),
        y: Math.max(0, Math.min(vh, center.y + (p.y - center.y) * 1.15))
    }));

    let srcCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [
        expandedPoints[0].x, expandedPoints[0].y, expandedPoints[1].x, expandedPoints[1].y,
        expandedPoints[2].x, expandedPoints[2].y, expandedPoints[3].x, expandedPoints[3].y
    ]);
    let dstCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, width, 0, width, height, 0, height]);
    
    let M = cv.getPerspectiveTransform(srcCoords, dstCoords);
    let warpedMat = new cv.Mat();
    cv.warpPerspective(fullSrc, warpedMat, M, new cv.Size(width, height), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
    
    // Preview in grayscale first
    cv.cvtColor(warpedMat, warpedMat, cv.COLOR_RGBA2GRAY);
    // Display preview
    warpedCanvas.width = width; warpedCanvas.height = height;
    cv.imshow('warpedCanvas', warpedMat);
    
    // Show actions
    resultDiv.classList.remove('hidden');
    textResult.innerHTML = "Confirm plate clarity before OCR.";
    document.getElementById('ocrActions').classList.remove('hidden');
    
    // Prepare thresholded version for OCR in the background
    cv.threshold(warpedMat, warpedMat, 0, 255, cv.THRESH_BINARY | cv.THRESH_OTSU);
    // We'll keep this on warpedCanvas for OCR
    cv.imshow('warpedCanvas', warpedMat);

    fullSrc.delete(); srcCoords.delete(); dstCoords.delete(); M.delete(); warpedMat.delete();
    toggleCamera(false);
}

function fallbackPureCanvasCrop() {
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const cropW = vw * 0.8; 
    const cropH = cropW / 4.7; 
    const cropX = (vw - cropW) / 2;
    const cropY = (vh - cropH) / 2;

    const processCtx = processCanvas.getContext('2d');
    processCanvas.width = 470; processCanvas.height = 100;
    processCtx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, 470, 100);

    let cropMat = cv.imread(processCanvas);
    cv.cvtColor(cropMat, cropMat, cv.COLOR_RGBA2GRAY);
    cv.threshold(cropMat, cropMat, 0, 255, cv.THRESH_BINARY | cv.THRESH_OTSU);
    
    warpedCanvas.width = 470; warpedCanvas.height = 100;
    cv.imshow('warpedCanvas', cropMat);
    cropMat.delete();

    resultDiv.classList.remove('hidden');
    document.getElementById('ocrActions').classList.remove('hidden');
    toggleCamera(false);
}

        async function runOCR() {
            const { data: { text } } = await tesseractWorker.recognize(warpedCanvas.toDataURL());
            navigator.geolocation.getCurrentPosition((pos) => {
                processUKPlate(text, pos.coords.latitude, pos.coords.longitude);
            }, () => { processUKPlate(text, 0, 0); });
        }

        function processUKPlate(rawText, lat, lon) {
            const cleanText = rawText.replace(/[^A-Z0-9]/gi, '').toUpperCase();
            const match = cleanText.match(/([A-Z]{2})([0-9]{2})([A-Z]{3})/);
            
            isReviewing = false; // Scan complete
            document.getElementById('ocrActions').classList.add('hidden');

            if (!match) {
                statusEl.innerText = `Scan Complete - No valid format found.`;
                textResult.innerHTML = `<strong>Raw OCR:</strong> ${cleanText || "No text detected."}<br>`;
                return;
            }

            const plateNumber = match[0];
            const memoryTag = match[1];
            const ageIdentifier = parseInt(match[2]);
            const data = getUKRegionData(memoryTag);
            
            // Age logic
            let year = 0;
            let period = "";
            if (ageIdentifier >= 51) {
                year = 2000 + (ageIdentifier - 50);
                period = "Late " + year + " (Sept-Feb)";
            } else {
                year = 2000 + ageIdentifier;
                period = "Early " + year + " (March-Aug)";
            }

            const plateData = {
                plate: plateNumber,
                region: data.region,
                office: data.office,
                year: period,
                timestamp: new Date().toLocaleString(),
                loc: lat ? `${lat.toFixed(4)}, ${lon.toFixed(4)}` : "N/A"
            };

            saveToHistory(plateData);
            
            statusEl.innerText = "Scan Complete.";
            textResult.innerHTML = `
                <div style="font-size: 20px; font-weight: bold; color: #32d74b; margin-bottom: 5px;">
                    ${plateNumber.slice(0,4)} ${plateNumber.slice(4)}
                </div>
                <strong>Region:</strong> ${data.region} (${data.office})<br>
                <strong>Registered:</strong> ${period}<br>
            `;
        }

        function saveToHistory(data) {
            let history = JSON.parse(localStorage.getItem('alpr_history') || '[]');
            history.unshift(data);
            if (history.length > 50) history.pop();
            localStorage.setItem('alpr_history', JSON.stringify(history));
            renderHistory();
        }

        function loadHistory() {
            renderHistory();
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('alpr_history') || '[]');
            historyList.innerHTML = history.map(item => `
                <li class="history-item">
                    <div class="plate-info">
                        <span class="plate-number">${item.plate.slice(0,4)} ${item.plate.slice(4)}</span>
                        <span class="plate-meta">${item.timestamp}</span>
                    </div>
                    <div class="plate-info" style="text-align: right; align-items: flex-end;">
                        <span class="plate-region">${item.region}</span>
                        <span class="plate-meta">${item.year}</span>
                    </div>
                </li>
            `).join('');
        }

        clearHistoryBtn.addEventListener('click', () => {
            if (confirm("Clear all history?")) {
                localStorage.setItem('alpr_history', '[]');
                renderHistory();
            }
        });

        function orderPoints(pts) {
    pts.sort((a, b) => a.x - b.x);
    let left = pts.slice(0, 2).sort((a, b) => a.y - b.y);
    let right = pts.slice(2, 4).sort((a, b) => a.y - b.y);
    return [left[0], right[0], right[1], left[1]]; // [TL, TR, BR, BL]
}

function extractPlateEdges(debugCtx) {
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (vw === 0) return null;

    const scale = Math.min(1.0, 640 / vw);
    const sw = Math.floor(vw * scale);
    const sh = Math.floor(vh * scale);

    processCanvas.width = sw;
    processCanvas.height = sh;
    const processCtx = processCanvas.getContext('2d');
    processCtx.drawImage(video, 0, 0, sw, sh);

    if (!srcMat || srcMat.cols !== sw || srcMat.rows !== sh) {
        if (srcMat) srcMat.delete();
        srcMat = new cv.Mat(sh, sw, cv.CV_8UC4);
    }
    srcMat.data.set(processCtx.getImageData(0, 0, sw, sh).data);
    
    cv.cvtColor(srcMat, grayMat, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(grayMat, blurMat, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
    cv.Canny(blurMat, edgesMat, 50, 150);

    let contours = new cv.MatVector(); 
    let hierarchy = new cv.Mat();
    cv.findContours(edgesMat, contours, hierarchy, cv.RETR_LIST, cv.CHAIN_APPROX_SIMPLE);

    let possiblePlates = [];
    if (debugCtx) debugCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

    for (let i = 0; i < contours.size(); ++i) {
        let cnt = contours.get(i);
        let area = cv.contourArea(cnt);
        
        if (area > (1500 * scale * scale)) {
            let peri = cv.arcLength(cnt, true);
            let approx = new cv.Mat();
            cv.approxPolyDP(cnt, approx, 0.02 * peri, true);

            if (approx.rows === 4) {
                let rect = cv.boundingRect(approx);
                let aspectRatio = rect.width / rect.height;
                
                if (aspectRatio >= 2.2 && aspectRatio <= 6.0) {
                    let pts = [];
                    for (let j = 0; j < 4; j++) {
                        pts.push({
                            x: approx.data32S[j * 2] / scale,
                            y: approx.data32S[j * 2 + 1] / scale
                        });
                    }
                    possiblePlates.push({ area: area, points: orderPoints(pts) });
                }
            }
            approx.delete();
        }
        cnt.delete();
    }
    contours.delete(); hierarchy.delete();

    if (possiblePlates.length > 0) {
        possiblePlates.sort((a, b) => b.area - a.area);
        return possiblePlates[0].points;
    }
    return null;
}

function warpAndRunOCR(points) {
    const width = 600; const height = 150; 
    
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    processCanvas.width = vw;
    processCanvas.height = vh;
    const processCtx = processCanvas.getContext('2d');
    processCtx.drawImage(video, 0, 0, vw, vh);
    
    let fullSrc = cv.imread(processCanvas);

    // Margin expansion (15% to ensure full text capture)
    const center = points.reduce((acc, p) => ({x: acc.x + p.x/4, y: acc.y + p.y/4}), {x:0, y:0});
    const expandedPoints = points.map(p => ({
        x: Math.max(0, Math.min(vw, center.x + (p.x - center.x) * 1.15)),
        y: Math.max(0, Math.min(vh, center.y + (p.y - center.y) * 1.15))
    }));

    let srcCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [
        expandedPoints[0].x, expandedPoints[0].y, expandedPoints[1].x, expandedPoints[1].y,
        expandedPoints[2].x, expandedPoints[2].y, expandedPoints[3].x, expandedPoints[3].y
    ]);
    let dstCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, width, 0, width, height, 0, height]);
    
    let M = cv.getPerspectiveTransform(srcCoords, dstCoords);
    let warpedMat = new cv.Mat();
    cv.warpPerspective(fullSrc, warpedMat, M, new cv.Size(width, height), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
    
    cv.cvtColor(warpedMat, warpedMat, cv.COLOR_RGBA2GRAY);
    // Use simple OTSU thresholding but with a check for light/dark
    cv.threshold(warpedMat, warpedMat, 0, 255, cv.THRESH_BINARY | cv.THRESH_OTSU);

    warpedCanvas.width = width; warpedCanvas.height = height;
    cv.imshow('warpedCanvas', warpedMat);
    
    fullSrc.delete(); srcCoords.delete(); dstCoords.delete(); M.delete(); warpedMat.delete();

    toggleCamera(false);
    statusEl.innerText = "Running Tesseract Engine...";
    runOCR();
}

function fallbackPureCanvasCrop() {
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const cropW = vw * 0.8; 
    const cropH = cropW / 4.7; 
    const cropX = (vw - cropW) / 2;
    const cropY = (vh - cropH) / 2;

    const processCtx = processCanvas.getContext('2d');
    processCanvas.width = 470; processCanvas.height = 100;
    processCtx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, 470, 100);

    let cropMat = cv.imread(processCanvas);
    cv.cvtColor(cropMat, cropMat, cv.COLOR_RGBA2GRAY);
    cv.threshold(cropMat, cropMat, 0, 255, cv.THRESH_BINARY | cv.THRESH_OTSU);
    
    warpedCanvas.width = 470; warpedCanvas.height = 100;
    cv.imshow('warpedCanvas', cropMat);
    cropMat.delete();

    toggleCamera(false);
    statusEl.innerText = "Camera offline. Running OCR...";
    runOCR();
}

        function drawTargetBox() {
            if (!isAiming) return;
            const vw = overlayCanvas.width;
            const vh = overlayCanvas.height;
            const cropW = vw * 0.8;
            const cropH = cropW / 4.7;
            const cropX = (vw - cropW) / 2;
            const cropY = (vh - cropH) / 2;

            overlayCtx.clearRect(0, 0, vw, vh);
            overlayCtx.strokeStyle = "rgba(255, 153, 0, 0.7)";
            overlayCtx.lineWidth = 6;
            overlayCtx.strokeRect(cropX, cropY, cropW, cropH);
        }

        function drawOverlay(points, color) {
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            overlayCtx.strokeStyle = color;
            overlayCtx.lineWidth = 6;
            overlayCtx.beginPath();
            overlayCtx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < 4; i++) overlayCtx.lineTo(points[i].x, points[i].y);
            overlayCtx.closePath(); overlayCtx.stroke();
        }

        async function runOCR() {
            const { data: { text } } = await tesseractWorker.recognize(warpedCanvas.toDataURL());
            navigator.geolocation.getCurrentPosition((pos) => {
                processUKPlate(text, pos.coords.latitude, pos.coords.longitude);
            }, () => { processUKPlate(text, 0, 0); });
        }

        function processUKPlate(rawText, lat, lon) {
            const cleanText = rawText.replace(/[^A-Z0-9]/gi, '').toUpperCase();
            const match = cleanText.match(/([A-Z]{2})([0-9]{2})([A-Z]{3})/);
            resultDiv.classList.remove('hidden');

            if (!match) {
                statusEl.innerText = `Scan Complete - No valid format found.`;
                textResult.innerHTML = `<strong>Raw OCR:</strong> ${cleanText || "No text detected."}<br>`;
                return;
            }
            const plateNumber = match[0];
            const memoryTag = match[1];
            const data = getUKRegionData(memoryTag);
            
            statusEl.innerText = "Scan Complete.";
            textResult.innerHTML = `
                <strong>Plate:</strong> ${plateNumber.slice(0,4)} ${plateNumber.slice(4)}<br>
                <strong>Region:</strong> ${data.region}<br>
                <strong>Local Office:</strong> ${data.office}<br>
                <strong>Location:</strong> ${lat ? `${lat.toFixed(5)}, ${lon.toFixed(5)}` : 'N/A'}<br>
            `;
        }
    </script>
