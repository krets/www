<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALPR - UK Database & Stealth Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 15px; background: #121212; color: #fff; }
        .container { display: flex; flex-direction: column; gap: 15px; }
        .video-wrapper { position: relative; width: 100%; border-radius: 8px; overflow: hidden; background: #000; line-height: 0; display: none; }
        video { width: 100%; display: block; }
        #overlayCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        canvas.hidden { display: none; }
        .controls { display: flex; flex-direction: column; gap: 10px; background: #1e1e1e; padding: 15px; border-radius: 8px; }
        
        .btn-group { display: flex; gap: 10px; }
        button { background: #333; color: #888; border: none; padding: 15px; border-radius: 8px; font-size: 14px; font-weight: bold; width: 100%; cursor: not-allowed; transition: background 0.3s; }
        button.ready { background: #0a84ff; color: white; cursor: pointer; }
        button.ready:active { background: #006ee6; }
        button.scanning { background: #ff3b30; color: white; cursor: pointer; animation: pulse 1.5s infinite; }
        button.aiming { background: #ff9900; color: white; cursor: pointer; }
        
        .sys-status { font-size: 12px; color: #aaa; display: flex; justify-content: space-between; padding: 0 5px; }
        .sys-status span.ready { color: #32d74b; }
        
        .output { background: #1e1e1e; padding: 15px; border-radius: 8px; font-size: 14px; line-height: 1.5; }
        .hidden { display: none; }
        #warpedCanvas { width: 100%; margin-top: 10px; border: 1px solid #333; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="video-wrapper" id="videoWrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="overlayCanvas"></canvas>
            <canvas id="processCanvas" class="hidden"></canvas>
        </div>

        <div class="controls">
            <div class="sys-status">
                <span id="camStatus">Cam: Waiting</span>
                <span id="cvStatus">OpenCV: Loading</span>
                <span id="ocrStatus">OCR: Loading</span>
            </div>
            <div class="btn-group">
                <button id="captureBtn" disabled>Dynamic Scan</button>
                <button id="manualBtn" disabled>Manual Scan</button>
            </div>
            <div id="status" style="text-align: center; font-size: 14px;">System initializing...</div>
        </div>

        <div class="output hidden" id="resultDiv">
            <div id="textResult"></div>
            <strong>Processed Image:</strong><br>
            <canvas id="warpedCanvas"></canvas>
        </div>
    </div>

    <script>
        // Comprehensive UK Memory Tag DB Router
        function getUKRegionData(tag) {
            const letter1 = tag.charAt(0);
            const letter2 = tag.charAt(1);
            
            const regions = {
                'A': { name: 'Anglia', offices: { 'A-N': 'Peterborough', 'O-U': 'Norwich', 'V-Y': 'Ipswich' } },
                'B': { name: 'Birmingham', offices: { 'A-Y': 'Birmingham' } },
                'C': { name: 'Cymru (Wales)', offices: { 'A-O': 'Cardiff', 'P-V': 'Swansea', 'W-Y': 'Bangor' } },
                'D': { name: 'Deeside', offices: { 'A-K': 'Chester', 'L-Y': 'Shrewsbury' } },
                'E': { name: 'Essex', offices: { 'A-Y': 'Chelmsford' } },
                'F': { name: 'Forest and Fens', offices: { 'A-P': 'Nottingham', 'R-Y': 'Lincoln' } },
                'G': { name: 'Garden of England', offices: { 'A-O': 'Maidstone', 'P-Y': 'Brighton' } },
                'H': { name: 'Hampshire & Dorset', offices: { 'A-J': 'Bournemouth', 'K-Y': 'Portsmouth' } },
                'K': { name: 'Milton Keynes', offices: { 'A-L': 'Borehamwood', 'M-Y': 'Northampton' } },
                'L': { name: 'London', offices: { 'A-J': 'Wimbledon', 'K-T': 'Stanmore', 'U-Y': 'Sidcup' } },
                'M': { name: 'Manchester & Merseyside', offices: { 'A-L': 'Manchester', 'M-Y': 'Isle of Man / Liverpool' } },
                'N': { name: 'North', offices: { 'A-O': 'Newcastle', 'P-Y': 'Stockton' } },
                'O': { name: 'Oxford', offices: { 'A-Y': 'Oxford' } },
                'P': { name: 'Preston', offices: { 'A-T': 'Preston', 'U-Y': 'Carlisle' } },
                'R': { name: 'Reading', offices: { 'A-Y': 'Reading' } },
                'S': { name: 'Scotland', offices: { 'A-J': 'Glasgow', 'K-O': 'Edinburgh', 'P-T': 'Dundee', 'U-W': 'Aberdeen', 'X-Y': 'Inverness' } },
                'V': { name: 'Severn Valley', offices: { 'A-Y': 'Worcester' } },
                'W': { name: 'West of England', offices: { 'A-J': 'Exeter', 'K-L': 'Truro', 'M-Y': 'Bristol' } },
                'Y': { name: 'Yorkshire', offices: { 'A-K': 'Leeds', 'L-U': 'Sheffield', 'V-Y': 'Beverley' } }
            };

            const region = regions[letter1];
            if (!region) return { region: "Unknown", office: "Unknown" };

            let office = "Unknown";
            for (const [range, name] of Object.entries(region.offices)) {
                const [start, end] = range.split('-');
                if (letter2 >= start && letter2 <= end) {
                    office = name;
                    break;
                }
            }
            return { region: region.name, office: office };
        }

        const video = document.getElementById('video');
        const videoWrapper = document.getElementById('videoWrapper');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const overlayCtx = overlayCanvas.getContext('2d');
        const processCanvas = document.getElementById('processCanvas');
        const warpedCanvas = document.getElementById('warpedCanvas');
        const statusEl = document.getElementById('status');
        const captureBtn = document.getElementById('captureBtn');
        const manualBtn = document.getElementById('manualBtn');
        const resultDiv = document.getElementById('resultDiv');
        const textResult = document.getElementById('textResult');

        let isDetecting = false;
        let isAiming = false;
        let openCvReady = false;
        let camReady = false;
        let videoTrack = null;
        let tesseractWorker = null;
        let srcMat, grayMat, blurMat, edgesMat;

        async function initTesseract() {
            tesseractWorker = await Tesseract.createWorker('eng');
            document.getElementById('ocrStatus').innerText = "OCR: Ready";
            document.getElementById('ocrStatus').classList.add('ready');
            checkReadyState();
        }
        initTesseract();

        function onOpenCvReady() {
            openCvReady = true;
            document.getElementById('cvStatus').innerText = "OpenCV: Ready";
            document.getElementById('cvStatus').classList.add('ready');
            checkReadyState();
        }

        navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } } })
            .then(setupVideo)
            .catch(err => {
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(setupVideo)
                    .catch(e => statusEl.innerText = "Camera error: " + e);
            });

        function setupVideo(stream) {
            video.srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];
            videoTrack.enabled = false; // Disable hardware initially
            
            video.onloadedmetadata = () => {
                overlayCanvas.width = video.videoWidth;
                overlayCanvas.height = video.videoHeight;
                processCanvas.width = video.videoWidth;
                processCanvas.height = video.videoHeight;
                
                camReady = true;
                document.getElementById('camStatus').innerText = "Cam: Ready";
                document.getElementById('camStatus').classList.add('ready');
                checkReadyState();
            };
        }

        function checkReadyState() {
            if (openCvReady && camReady && tesseractWorker) {
                statusEl.innerText = "System Ready. Camera offline.";
                captureBtn.disabled = false;
                captureBtn.className = 'ready';
                manualBtn.disabled = false;
                manualBtn.className = 'ready';
                
                srcMat = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
                grayMat = new cv.Mat();
                blurMat = new cv.Mat();
                edgesMat = new cv.Mat();
            }
        }

        function toggleCamera(state) {
            videoTrack.enabled = state;
            videoWrapper.style.display = state ? 'block' : 'none';
            if (!state) overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        }

        // --- Dynamic Scan ---
        captureBtn.addEventListener('click', () => {
            if (isAiming) cancelManual();

            if (isDetecting) {
                isDetecting = false;
                captureBtn.className = 'ready';
                captureBtn.innerText = "Dynamic Scan";
                statusEl.innerText = "Camera offline.";
                toggleCamera(false);
            } else {
                isDetecting = true;
                toggleCamera(true);
                captureBtn.className = 'scanning';
                captureBtn.innerText = "Scanning... Tap to Stop";
                statusEl.innerText = "Searching for plate outline...";
                resultDiv.classList.add('hidden');
                requestAnimationFrame(processVideo);
            }
        });

        function processVideo() {
            if (!isDetecting) return;
            const points = extractPlateEdges(true);
            
            if (points) {
                isDetecting = false; 
                captureBtn.className = 'ready';
                captureBtn.innerText = "Dynamic Scan";
                statusEl.innerText = "Plate detected! Warping and running OCR...";
                drawOverlay(points, "#00ff00");
                warpAndRunOCR(points);
            } else {
                overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
                requestAnimationFrame(processVideo);
            }
        }

        // --- Manual Scan ---
        function cancelManual() {
            isAiming = false;
            manualBtn.className = 'ready';
            manualBtn.innerText = "Manual Scan";
            toggleCamera(false);
        }

        manualBtn.addEventListener('click', () => {
            if (isDetecting) captureBtn.click(); // Stop dynamic loop

            if (!isAiming) {
                // Enter Aim Mode
                isAiming = true;
                toggleCamera(true);
                manualBtn.className = 'aiming';
                manualBtn.innerText = "Capture Plate Inside Box";
                statusEl.innerText = "Align plate inside the orange box.";
                resultDiv.classList.add('hidden');
                drawTargetBox();
            } else {
                // Capture Frame
                isAiming = false;
                manualBtn.className = 'ready';
                manualBtn.innerText = "Manual Scan";
                statusEl.innerText = "Processing captured frame...";
                
                const points = extractPlateEdges(false);
                if (points) {
                    drawOverlay(points, "#00ff00");
                    warpAndRunOCR(points);
                } else {
                    const fallbackPoints = getFallbackPoints();
                    drawOverlay(fallbackPoints, "#ff9900");
                    warpAndRunOCR(fallbackPoints);
                }
            }
        });

        function getFallbackPoints() {
            let cw = processCanvas.width;
            let ch = processCanvas.height;
            let cropW = cw * 0.8;
            let cropH = cropW / 4.7; // Enforce exact UK plate ratio to prevent warp stretching
            let cropX = (cw - cropW) / 2;
            let cropY = (ch - cropH) / 2;

            return [
                {x: cropX, y: cropY},
                {x: cropX + cropW, y: cropY},
                {x: cropX + cropW, y: cropY + cropH},
                {x: cropX, y: cropY + cropH}
            ];
        }

        function drawTargetBox() {
            const points = getFallbackPoints();
            drawOverlay(points, "rgba(255, 153, 0, 0.7)");
        }

        // --- Core Shared Logic ---
        function extractPlateEdges(strictAspectRatio) {
            const processCtx = processCanvas.getContext('2d');
            processCtx.drawImage(video, 0, 0, processCanvas.width, processCanvas.height);
            srcMat.data.set(processCtx.getImageData(0, 0, processCanvas.width, processCanvas.height).data);
            
            cv.cvtColor(srcMat, grayMat, cv.COLOR_RGBA2GRAY);
            cv.GaussianBlur(grayMat, blurMat, new cv.Size(5, 5), 0, 0, cv.BORDER_DEFAULT);
            cv.Canny(blurMat, edgesMat, 50, 150);

            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(edgesMat, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let platePoints = null;

            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                
                if (area > 1500) {
                    let approx = new cv.Mat();
                    let perimeter = cv.arcLength(cnt, true);
                    let epsilon = strictAspectRatio ? 0.02 : 0.04;
                    cv.approxPolyDP(cnt, approx, epsilon * perimeter, true);

                    if (approx.rows === 4) {
                        let rect = cv.boundingRect(approx);
                        let aspectRatio = rect.width / rect.height;
                        let isValidRatio = strictAspectRatio ? (aspectRatio >= 3.0 && aspectRatio <= 6.0) : true;
                        
                        if (isValidRatio) {
                            platePoints = [];
                            for (let j = 0; j < 4; j++) platePoints.push({ x: approx.data32S[j * 2], y: approx.data32S[j * 2 + 1] });
                            approx.delete();
                            break;
                        }
                    }
                    approx.delete();
                }
                cnt.delete();
            }
            contours.delete();
            hierarchy.delete();
            return platePoints;
        }

        function drawOverlay(points, color) {
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
            overlayCtx.strokeStyle = color;
            overlayCtx.lineWidth = 4;
            overlayCtx.beginPath();
            overlayCtx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < 4; i++) overlayCtx.lineTo(points[i].x, points[i].y);
            overlayCtx.closePath();
            overlayCtx.stroke();
        }

        function orderPoints(pts) {
            pts.sort((a, b) => a.x - b.x);
            let leftMost = [pts[0], pts[1]].sort((a, b) => a.y - b.y);
            let rightMost = [pts[2], pts[3]].sort((a, b) => a.y - b.y);
            return [leftMost[0], rightMost[0], rightMost[1], leftMost[1]];
        }

        async function warpAndRunOCR(points) {
            const orderedPts = orderPoints(points);
            const width = 470; 
            const height = 100;

            let srcCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [
                orderedPts[0].x, orderedPts[0].y, orderedPts[1].x, orderedPts[1].y,
                orderedPts[2].x, orderedPts[2].y, orderedPts[3].x, orderedPts[3].y
            ]);
            let dstCoords = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, width, 0, width, height, 0, height]);
            
            let M = cv.getPerspectiveTransform(srcCoords, dstCoords);
            let warpedMat = new cv.Mat();
            let dsize = new cv.Size(width, height);
            
            cv.warpPerspective(srcMat, warpedMat, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
            cv.imshow('warpedCanvas', warpedMat);
            
            srcCoords.delete(); dstCoords.delete(); M.delete(); warpedMat.delete();

            // Hardware shutdown after capture to save battery
            toggleCamera(false);
            statusEl.innerText = "Camera offline. Running OCR...";

            const { data: { text } } = await tesseractWorker.recognize(warpedCanvas.toDataURL());
            
            navigator.geolocation.getCurrentPosition((pos) => {
                processUKPlate(text, pos.coords.latitude, pos.coords.longitude);
            }, () => {
                processUKPlate(text, 0, 0); 
            });
        }

        function processUKPlate(rawText, lat, lon) {
            const cleanText = rawText.replace(/[^A-Z0-9]/gi, '').toUpperCase();
            const match = cleanText.match(/([A-Z]{2})([0-9]{2})([A-Z]{3})/);

            resultDiv.classList.remove('hidden');

            if (!match) {
                statusEl.innerText = `Scan Complete - No valid format found.`;
                textResult.innerHTML = `<strong>Raw OCR:</strong> ${cleanText}<br>`;
                return;
            }

            const plateNumber = match[0];
            const memoryTag = match[1];
            const data = getUKRegionData(memoryTag);
            
            statusEl.innerText = "Scan Complete.";
            textResult.innerHTML = `
                <strong>Plate:</strong> ${plateNumber.slice(0,4)} ${plateNumber.slice(4)}<br>
                <strong>Region:</strong> ${data.region}<br>
                <strong>Local Office:</strong> ${data.office}<br>
                <strong>Location:</strong> ${lat ? `${lat.toFixed(5)}, ${lon.toFixed(5)}` : 'N/A'}<br>
            `;
        }
    </script>
</body>
</html>
