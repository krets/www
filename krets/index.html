  <style>
  html, body {
      margin: 0;
      padding: 0;
      overflow: hidden; /* This prevents scrollbars */
      height: 100%;
  }
  body {
      background-color: black;

<body>
<canvas id="canvas"></canvas>
<script type="text/javascript">

    let canvas = document.getElementById('canvas');
    let context = canvas.getContext('2d');
    let lines = [];
    let step = 5;
    let tick = 0;
    let mouseX = 0;
    let mouseY = 0;
    let pmouseX = 0;
    let pmouseY = 0;
    let isMouseDown = false;
    let activeTouches = []; // Track multiple touch points
    let amplitude = 20
    let frequency = 90
    let lineCount = 60;
    let pointCount = 60;
    let wobble = 130;
    let windowPad = .2;
    let lineGrow = .08;
    let tickWobble = 2;

    function makeLines() {
        lines.length = 0;
        let step_x = (window.innerWidth*(1-windowPad))/pointCount;
        let start_x = window.innerWidth*windowPad/2;
        let step_y = (window.innerHeight*(1-windowPad))/lineCount;
        let start_y = window.innerHeight*windowPad/2;
        
        for (let i = 0; i < lineCount; i++) {
            let line = [];
            let base_y = start_y + i * step_y;
            for (let j = 0; j < pointCount; j++) {
                line.push({
                    x: j*step_x+start_x,
                    y: base_y + (Math.random() * wobble) - wobble/2, // persistent jittered position from original
                    base_y: base_y,
                    vy: 0,     // physics velocity
                    y_off: 0   // physics offset
                });
            }
            lines.push(line);
        }
        drawStuff();
    }

    function drawStuff() {
        context.clearRect(0, 0, canvas.width, canvas.height);
        let start_y = window.innerHeight*windowPad/2;
        let step_y = (window.innerHeight*(1-windowPad))/lineCount;
        let step_x = (window.innerWidth*(1-windowPad))/pointCount;

        for (let i = 0; i < lines.length; i++){
            let line = lines[i];

            for (let j=0; j < line.length; j++){
                let p = line[j];
                
                // 1. Original Spike Envelope Logic
                let xDistNormalized = Math.min(1, Math.abs(mouseX - p.x) / (window.innerWidth * (1 - windowPad) / 2));
                let scale = Math.pow(1 - Math.sqrt(xDistNormalized), 4);
                let max = p.base_y;
                let min = p.base_y - (wobble * scale);
                
                // 2. Original Jitter (Random Walk clamped to envelope)
                p.y -= tickWobble - (tickWobble * Math.random() * 2);
                p.y = Math.min(Math.max(p.y, min), max);

                // 3. Physics (Strumming)
                let render_y = p.y + p.y_off;
                
                // Collect all active interaction points
                let interactors = [];
                if (isMouseDown) {
                    interactors.push({ x: mouseX, y: mouseY, px: pmouseX, py: pmouseY });
                }
                activeTouches.forEach(t => {
                    interactors.push({ x: t.x, y: t.y, px: t.px, py: t.py });
                });

                interactors.forEach(interactor => {
                    let dx = Math.abs(interactor.x - p.x);
                    let influence_radius = 120;
                    
                    if (dx < influence_radius) { 
                        let falloff = Math.pow(1 - (dx / influence_radius), 2);
                        let iMinY = Math.min(interactor.y, interactor.py);
                        let iMaxY = Math.max(interactor.y, interactor.py);
                        
                        // Vertical crossing check
                        if (iMaxY >= render_y - 20 && iMinY <= render_y + 20) {
                            let force = (interactor.y - interactor.py) * 0.5 * falloff;
                            p.vy += Math.max(Math.min(force, 50), -50);
                        }
                    }
                });
                
                p.y_off += p.vy;
                p.vy += -p.y_off * 0.1; // Spring back
                p.vy *= 0.85; // Damping
                
                // Clamp offset to prevent the line from flying away or hiding too much
                p.y_off = Math.max(Math.min(p.y_off, 200), -200);
                
                p.current_render_y = p.y + p.y_off;
            }

            // Draw the "Curtain" fill to properly layer lines
            context.beginPath();
            // Start from bottom-left
            context.moveTo(line[0].x, canvas.height);
            // Trace the wavy line
            for (let j=0; j < line.length; j++){
                context.lineTo(line[j].x, line[j].current_render_y);
            }
            // End at bottom-right
            context.lineTo(line[line.length-1].x, canvas.height);
            context.closePath();
            
            context.fillStyle = "#000000";
            context.fill();

            // Draw the actual white line
            context.beginPath();
            context.lineWidth = Math.max((i+1)*lineGrow, 1);
            context.moveTo(line[0].x, line[0].current_render_y);
            for (let j=1; j < line.length; j++){
                context.lineTo(line[j].x, line[j].current_render_y);
            }
            context.strokeStyle = '#ffffff';
            context.stroke();
        }
        pmouseX = mouseX;
        pmouseY = mouseY;
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        makeLines();
 
    }


    window.addEventListener('mousedown', (e) => {
        isMouseDown = true;
        pmouseX = e.clientX;
        pmouseY = e.clientY;
    });
    window.addEventListener('mouseup', () => isMouseDown = false);
    window.addEventListener('mouseleave', () => isMouseDown = false);

    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    // Touch support for strumming
    function handleTouches(e) {
        let newTouches = [];
        for (let i = 0; i < e.touches.length; i++) {
            let t = e.touches[i];
            let pt = activeTouches.find(at => at.id === t.identifier);
            newTouches.push({
                id: t.identifier,
                x: t.clientX,
                y: t.clientY,
                px: pt ? pt.x : t.clientX,
                py: pt ? pt.y : t.clientY
            });
        }
        activeTouches = newTouches;
        if (e.touches.length > 0) {
            // Use the first touch for the "peak" behavior
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }
    }

    window.addEventListener('touchstart', (e) => {
        handleTouches(e);
    });
    window.addEventListener('touchend', (e) => {
        handleTouches(e);
        if (e.touches.length === 0) activeTouches = [];
    });
    window.addEventListener('touchcancel', (e) => {
        handleTouches(e);
        if (e.touches.length === 0) activeTouches = [];
    });
    window.addEventListener('touchmove', (e) => {
        handleTouches(e);
        // prevent scrolling while interacting
        if (e.touches.length > 0) e.preventDefault();
    }, { passive: false });

    window.addEventListener('resize', resizeCanvas, false);
    setInterval(drawStuff, 20);
    resizeCanvas();


</script>
<script src="/js/menu.js"></script>
</body>
